name: Playwright Daily Scheduled Run

on:
  # 1. Ručno pokretanje (opcionalno)
  workflow_dispatch:

  # 2. Zakazano pokretanje (KRITIČAN DEO)
  schedule:
    # cron izraz za 6:00 UJUTRU.
    # GitHub Actions podrazumevano koristi UTC vreme.
    # Da bi se izvršilo u 6:00 CET (Central European Time),
    # moramo izračunati ekvivalentno UTC vreme.
    # *Tokom zime, CET je UTC+1 (dakle, 6:00 CET = 5:00 UTC)
    # *Tokom leta, CEST je UTC+2 (dakle, 6:00 CEST = 4:00 UTC)
    #
    # Najbolje je uzeti najčešće korišćenje (ili se opredeliti za jedno)
    # Ovde koristimo 5:00 UTC, što je 6:00 CET (za zimsko vreme)
    # *NAPOMENA: Za letnje vreme, treba staviti 4:00 UTC! Ako je projekat za proleće/leto, promenite na '0 4 * * *'
    - cron: "0 5 * * *" # 5:00 UTC (otprilike 6:00 CET)

jobs:
  run-tests:
    timeout-minutes: 60
    # Koristimo najnoviju Ubuntu verziju
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Prilagodite Vašoj verziji Node.js

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        # Instalira sve potrebne pretraživače
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test --reporter=html,list # Prilagodite komandu ako Vam treba drugi reporter

      # Ako želite da sačuvate izveštaje sa testiranja
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          # Ističe nakon 7 dana
          retention-days: 7
